<!DOCTYPE html>
<html>
<head><meta charset="utf-8">
	<title>Lector de PDF estilo revista</title>
	<style type="text/css">body {
      background-color: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 10vh;
      margin: 0;
      padding: 0;
    }

    #flipbook-container {
      position: relative;
      padding-top: 10px; /* Espacio en blanco encima del flipbook */
      margin-bottom: 2px; /* Espacio en blanco debajo del flipbook */
      width: 100%;
      height: 0;
    }

    #flipbook {
      position: absolute;
      border: none;
      width: 100%;
      height: calc(100% - 10px); /* Resta el espacio en blanco superior e inferior */
      left: 0;
      top: 0;
    }

    #btn-back {
      background-color: white;
      color: black;
      border: none;
      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      font-family: 'montaserrat',sans-serif;
      text-transform: uppercase;
      display: inline-block;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 10px;
    }
	</style>
</head>
<body>
<p><a href="https://progresseducational.com.mx/" id="btn-back">Visita nuestra p&aacute;gina</a></p>

<div id="flipbook-container">
<div style="position:relative;padding-top:max(80%,324px);width:100%;height:100%;"><iframe allowfullscreen="true" allowtransparency="true" frameborder="0" scrolling="no" seamless="seamless" src="https://online.fliphtml5.com/yzebt/sneh/" style="position:absolute;border:none;width:100%;height:200%;left:0;top:0;"></iframe></div>
</div>
</body>
</html>
